<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- SEO Meta Tags -->
    <title id="metaTitle">MashaAllah | Premium Shopping Experience</title>
    <meta name="description" id="metaDescription"
        content="MashaAllah is your trusted online shopping destination in Pakistan. Enjoy 7-day returns and fast delivery.">
    <meta name="keywords"
        content="MashaAllah, online store, Pakistan shopping, trusted shop, premium products, ecommerce">
    <meta name="author" content="MashaAllah Bazaar">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://mashaallah.shop/info">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mashaallah.shop/info">
    <meta property="og:title" content="MashaAllah | About & Contact">
    <meta property="og:description"
        content="Learn about MashaAllah — your trusted destination for premium products and exceptional service in Pakistan.">
    <meta property="og:image" content="image/logo.png">
    <meta property="og:site_name" content="MashaAllah Bazaar">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://mashaallah.shop/info">
    <meta property="twitter:title" content="MashaAllah | About & Contact">
    <meta property="twitter:description"
        content="Learn about MashaAllah — your trusted destination for premium products and exceptional service.">
    <meta property="twitter:image" content="image/logo.png">

    <!-- Favicon -->
    <link rel="icon" href="image/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="image/logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');

        * {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 50%, #c2410c 100%);
        }

        .gradient-text {
            background: linear-gradient(135deg, #f97316, #ea580c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.15);
        }

        .social-btn {
            transition: all 0.2s ease;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #f97316;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ea580c;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-orange-50 via-white to-amber-50 min-h-screen">

    <!-- shopMeta data definition - Complete website configuration -->
    <script type="module">
        // ============================================
        // SHOP META CONFIGURATION (Directly embedded from shopMeta)
        // ============================================
        const shopMeta = {
            website: {
                name: "MashaAllah",
                tagline: "Shop with Trust, Guaranteed Satisfaction",
                description: "MashaAllah is your trusted online shopping destination in Pakistan. Enjoy a 7-day return guarantee, fast delivery within 3–6 days, and a smooth, reliable shopping experience.",
                logo: "image/logo.png",
            },
            about: {
                title: "✨ About MashaAllah",
                description: "MashaAllah is committed to providing high-quality products with a reliable and hassle-free shopping experience. We focus on customer satisfaction, fast delivery, and trustworthy service.\n\n🌟 Our Mission:\nTo make online shopping simple, safe, and accessible for everyone.\n\n💎 Our Promise:\n• 7 Days Return Guarantee\n• Fast Delivery (3–6 Working Days)\n• Trusted Customer Support\n• Quality Products",
            },
            contact: {
                title: "📞 Contact Us",
                email: "sayeshamall@gmail.com",
                phone: "+92 341-3775-100",
                address: "Pakistan",
                social: {
                    facebook: "https://web.facebook.com/profile.php?id=61578279846188",
                    instagram: "https://www.instagram.com/ayeshamall2/",
                    tiktok: "https://www.tiktok.com/@ayeshamall0",
                    whatsapp: "https://wa.me/923413775100"
                },
            },
            privacyPolicy: {
                title: "🔒 Privacy Policy",
                content: "At MashaAllah, your privacy is our priority. This Privacy Policy explains how we collect, use, disclose, and safeguard your personal information when you use our services.\n\n📋 Information We Collect:\n• Personal Identification Information: Name, email address, phone number, shipping address\n• Payment Information: Transaction details (full payment data is processed securely by our payment partners)\n• Order History: Products purchased, delivery status, and return records\n• Technical Data: IP address, browser type, device information (for service optimization)\n\n🔐 How We Use Your Information:\n• Process and fulfill your orders accurately\n• Communicate order updates, delivery status, and customer support\n• Improve our website, products, and shopping experience\n• Prevent fraud and ensure transaction security\n• Comply with legal obligations in Pakistan\n\n🛡️ Data Protection:\nYour data is محفوظ (secure). We implement industry-standard security measures including SSL encryption, secure servers, and restricted internal access to protect against unauthorized access, alteration, disclosure, or destruction.\n\n🤝 Information Sharing:\nWe do NOT sell, trade, or rent your personal information to third parties. Limited data (name, address, phone number) is shared only with:\n• Courier partners for delivery purposes\n• Legal authorities when required by Pakistani law\n\n🍪 Cookies:\nOur website uses cookies to enhance your browsing experience, remember cart items, and analyze site traffic. You can disable cookies in your browser settings.\n\n👤 Your Rights:\nYou have the right to:\n• Access the personal data we hold about you\n• Request correction of inaccurate information\n• Request deletion of your account and data (subject to legal retention requirements)\n• Withdraw consent for marketing communications\n\n📞 Contact Us:\nFor privacy-related questions or to exercise your rights, contact us at sayeshamall@gmail.com or +92 341-3775-100.\n\n📅 Policy Updates:\nThis Privacy Policy may be updated periodically. Changes will be posted on this page with the 'Last Updated' date.",
            },
            returnPolicy: {
                title: "🔁 Return & Delivery Policy",
                content: "We offer a 7 Days Return Guarantee. Products must be unused and in original condition for return. In case of size issue or damaged/unusable product, return is accepted. Return delivery charges will be paid by the customer.\n\n🚚 Delivery Time: 3–6 Working Days.",
            },
        };

        // ============================================
        // Apply Website Name & Tagline to Page
        // ============================================
        const websiteName = shopMeta.website.name;
        const tagline = shopMeta.website.tagline;

        // Update page title with tagline
        document.title = `${websiteName} | ${tagline}`;

        // Update meta title
        const metaTitle = document.getElementById('metaTitle');
        if (metaTitle) metaTitle.setAttribute('content', `${websiteName} | Premium Shopping Destination`);

        // Get page parameter from URL
        const params = new URLSearchParams(window.location.search);
        const page = params.get("page");

        // Update meta description based on page
        const metaDescription = document.getElementById('metaDescription');

        // Container elements with proper IDs
        const container = document.getElementById('dynamicContent');
        const headerLogo = document.getElementById('headerLogo');
        const headerShopName = document.getElementById('headerShopName');
        const headerShopTagline = document.getElementById('headerShopTagline');

        // Update header with website info
        if (headerShopName) headerShopName.textContent = websiteName;
        if (headerShopTagline) headerShopTagline.textContent = tagline;

        // Update logo alt text
        if (headerLogo) headerLogo.alt = `${websiteName} Logo`;

        // Reference to page title element
        let pageTitleElement = document.getElementById('pageTitle');

        // Reference to footer dynamic shop name span (the problematic span)
        const footerShopNameSpan = document.getElementById('footerShopNameSpan');

        // Helper to update footer span with shop name
        function updateFooterShopName() {
            if (footerShopNameSpan) {
                footerShopNameSpan.textContent = websiteName;
            }
        }

        // Function to render content with beautiful UI
        function renderAbout() {
            const data = shopMeta.about;
            document.title = `${websiteName} | About Us | ${tagline}`;
            if (metaTitle) metaTitle.setAttribute('content', `${websiteName} | About Our Premium Store`);
            if (metaDescription) metaDescription.setAttribute('content', `Learn about ${websiteName}'s mission, quality commitment, and curated collections. Trusted online shopping destination in Pakistan.`);
            if (pageTitleElement) pageTitleElement.textContent = websiteName;
            updateFooterShopName();

            container.innerHTML = `
                <div class="animate-fade-in">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-14 h-14 gradient-bg rounded-2xl flex items-center justify-center shadow-lg">
                            <i class="fas fa-store text-white text-2xl"></i>
                        </div>
                        <div>
                            <h2 class="text-3xl md:text-4xl font-bold text-gray-800">${escapeHtml(data.title)}</h2>
                            <p class="text-orange-500 text-sm mt-1">${escapeHtml(tagline)}</p>
                        </div>
                    </div>
                    <div class="prose prose-lg max-w-none text-gray-600 leading-relaxed whitespace-pre-line space-y-4">
                        ${data.description.split('\n\n').map(para => `<p class="mb-4">${escapeHtml(para)}</p>`).join('')}
                    </div>
                    <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-gradient-to-br from-orange-50 to-amber-50 p-4 rounded-xl text-center card-hover">
                            <div class="w-12 h-12 gradient-bg rounded-full flex items-center justify-center mx-auto mb-3">
                                <i class="fas fa-trophy text-white text-lg"></i>
                            </div>
                            <p class="font-semibold text-gray-700">Quality Assured</p>
                            <p class="text-xs text-gray-500 mt-1">Premium standards</p>
                        </div>
                        <div class="bg-gradient-to-br from-orange-50 to-amber-50 p-4 rounded-xl text-center card-hover">
                            <div class="w-12 h-12 gradient-bg rounded-full flex items-center justify-center mx-auto mb-3">
                                <i class="fas fa-clock text-white text-lg"></i>
                            </div>
                            <p class="font-semibold text-gray-700">24/7 Support</p>
                            <p class="text-xs text-gray-500 mt-1">Always here for you</p>
                        </div>
                        <div class="bg-gradient-to-br from-orange-50 to-amber-50 p-4 rounded-xl text-center card-hover">
                            <div class="w-12 h-12 gradient-bg rounded-full flex items-center justify-center mx-auto mb-3">
                                <i class="fas fa-lock text-white text-lg"></i>
                            </div>
                            <p class="font-semibold text-gray-700">Secure Payments</p>
                            <p class="text-xs text-gray-500 mt-1">100% encrypted</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPrivacy() {
            const data = shopMeta.privacyPolicy;
            document.title = `${websiteName} | Privacy Policy`;
            if (metaTitle) metaTitle.setAttribute('content', `${websiteName} | Privacy Policy & Data Protection`);
            if (metaDescription) metaDescription.setAttribute('content', `Read ${websiteName}'s privacy policy. Learn how we protect your data, secure transactions, and respect your privacy.`);
            if (pageTitleElement) pageTitleElement.textContent = websiteName;
            updateFooterShopName();

            container.innerHTML = `
                <div class="animate-fade-in">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-14 h-14 gradient-bg rounded-2xl flex items-center justify-center shadow-lg">
                            <i class="fas fa-shield-alt text-white text-2xl"></i>
                        </div>
                        <div>
                            <h2 class="text-3xl md:text-4xl font-bold text-gray-800">${escapeHtml(data.title)}</h2>
                            <p class="text-orange-500 text-sm mt-1">Your trust, our priority</p>
                        </div>
                    </div>
                    <div class="bg-gradient-to-br from-gray-50 to-gray-100 rounded-2xl p-6 mb-6 shadow-inner">
                        <div class="prose prose-gray max-w-none text-gray-600 leading-relaxed whitespace-pre-line">
                            ${data.content.split('\n\n').map(para => `<p class="mb-3">${escapeHtml(para)}</p>`).join('')}
                        </div>
                    </div>
                    <div class="flex flex-wrap items-center gap-3 text-sm text-gray-500 bg-amber-50 p-4 rounded-xl border border-amber-200">
                        <i class="fas fa-check-circle text-green-500 text-lg"></i>
                        <span>Last updated: January 2025 | Version 2.0</span>
                        <i class="fas fa-shield-alt text-orange-500 ml-auto"></i>
                    </div>
                </div>
            `;
        }

        function renderContact() {
            const data = shopMeta.contact;
            document.title = `${websiteName} | Contact Us | ${tagline}`;
            if (metaTitle) metaTitle.setAttribute('content', `${websiteName} | Contact & Support`);
            if (metaDescription) metaDescription.setAttribute('content', `Get in touch with ${websiteName}. Customer support available 24/7. Call, email, or connect via social media.`);
            if (pageTitleElement) pageTitleElement.textContent = websiteName;
            updateFooterShopName();

            // Prepare social links safely
            const facebookLink = data.social.facebook || '#';
            const instagramLink = data.social.instagram || '#';
            const whatsappLink = data.social.whatsapp || `https://wa.me/${data.phone.replace(/[^0-9+]/g, '')}`;
            const tiktokLink = data.social.tiktok || '#';

            container.innerHTML = `
                <div class="animate-fade-in">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-14 h-14 gradient-bg rounded-2xl flex items-center justify-center shadow-lg">
                            <i class="fas fa-headset text-white text-2xl"></i>
                        </div>
                        <div>
                            <h2 class="text-3xl md:text-4xl font-bold text-gray-800">${escapeHtml(data.title)}</h2>
                            <p class="text-orange-500 text-sm mt-1">We'd love to hear from you</p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <div class="bg-gradient-to-br from-orange-50 to-amber-50 p-6 rounded-2xl card-hover border border-orange-100">
                            <div class="w-12 h-12 gradient-bg rounded-full flex items-center justify-center mb-4">
                                <i class="fas fa-envelope text-white text-xl"></i>
                            </div>
                            <h3 class="font-bold text-gray-800 text-lg mb-1">Email Us</h3>
                            <a href="mailto:${escapeHtml(data.email)}" class="text-orange-600 hover:underline break-all font-medium">${escapeHtml(data.email)}</a>
                            <p class="text-gray-500 text-sm mt-2">Response within 24 hours</p>
                        </div>
                        
                        <div class="bg-gradient-to-br from-orange-50 to-amber-50 p-6 rounded-2xl card-hover border border-orange-100">
                            <div class="w-12 h-12 gradient-bg rounded-full flex items-center justify-center mb-4">
                                <i class="fas fa-phone-alt text-white text-xl"></i>
                            </div>
                            <h3 class="font-bold text-gray-800 text-lg mb-1">Call / WhatsApp</h3>
                            <a href="tel:${escapeHtml(data.phone)}" class="text-orange-600 hover:underline font-medium">${escapeHtml(data.phone)}</a>
                            <p class="text-gray-500 text-sm mt-2">Mon-Sat, 10AM - 8PM</p>
                        </div>
                    </div>
                    
                    <div class="bg-gradient-to-r from-gray-50 to-gray-100 rounded-2xl p-6 mb-6 border border-gray-200">
                        <div class="flex gap-4">
                            <div class="w-10 h-10 gradient-bg rounded-full flex items-center justify-center flex-shrink-0">
                                <i class="fas fa-map-marker-alt text-white"></i>
                            </div>
                            <div>
                                <p class="font-bold text-gray-800 mb-1">Visit Our Showroom</p>
                                <p class="text-gray-600 leading-relaxed">${escapeHtml(data.address)}</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="border-t border-gray-200 pt-6">
                        <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2 text-lg">
                            <i class="fab fa-facebook-messenger text-blue-500"></i> Connect With Us
                        </h3>
                        <div class="flex flex-wrap gap-3">
                            <a href="${facebookLink}" target="_blank" class="social-btn flex items-center gap-2 px-5 py-2.5 bg-[#1877F2] text-white rounded-xl hover:shadow-lg transition-all duration-200 font-medium">
                                <i class="fab fa-facebook-f"></i> Facebook
                            </a>
                            <a href="${instagramLink}" target="_blank" class="social-btn flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-xl hover:shadow-lg transition-all duration-200 font-medium">
                                <i class="fab fa-instagram"></i> Instagram
                            </a>
                            <a href="${whatsappLink}" target="_blank" class="social-btn flex items-center gap-2 px-5 py-2.5 bg-[#25D366] text-white rounded-xl hover:shadow-lg transition-all duration-200 font-medium">
                                <i class="fab fa-whatsapp"></i> WhatsApp
                            </a>
                            ${tiktokLink !== '#' ? `<a href="${tiktokLink}" target="_blank" class="social-btn flex items-center gap-2 px-5 py-2.5 bg-[#000000] text-white rounded-xl hover:shadow-lg transition-all duration-200 font-medium">
                                <i class="fab fa-tiktok"></i> TikTok
                            </a>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderDefault() {
            document.title = `${websiteName} | ${tagline}`;
            if (pageTitleElement) pageTitleElement.textContent = websiteName;
            updateFooterShopName();

            container.innerHTML = `
                <div class="text-center py-12">
                    <div class="w-24 h-24 gradient-bg rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
                        <i class="fas fa-compass text-white text-4xl"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-700">Page Not Found</h2>
                    <p class="text-gray-500 mt-2">The requested information page does not exist.</p>
                    <a href="index.html" class="inline-flex items-center gap-2 mt-6 px-6 py-3 gradient-bg text-white rounded-xl hover:shadow-lg transition-all duration-200 font-medium">
                        <i class="fas fa-arrow-left"></i> Return to Shop
                    </a>
                </div>
            `;
        }

        // Simple escape function to prevent XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function (c) {
                return c;
            });
        }

        // Render based on page parameter
        if (page === "about") {
            renderAbout();
        } else if (page === "privacy") {
            renderPrivacy();
        } else if (page === "contact") {
            renderContact();
        } else {
            renderDefault();
        }

        // Add fade-in animation style
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(15px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
                animation: fadeIn 0.6s ease-out forwards;
            }
        `;
        document.head.appendChild(style);
    </script>

    <!-- Header Banner HTML -->
    <div class="gradient-bg relative overflow-hidden">
        <div class="absolute inset-0 opacity-20">
            <div class="absolute -top-24 -right-24 w-64 h-64 bg-white rounded-full blur-3xl"></div>
            <div class="absolute -bottom-32 -left-32 w-80 h-80 bg-white rounded-full blur-3xl"></div>
            <div class="absolute top-1/2 left-1/2 w-96 h-96 bg-white rounded-full blur-3xl opacity-10"></div>
        </div>
        <div class="max-w-5xl mx-auto px-6 py-8 md:py-10 relative z-10">
            <div class="flex flex-col md:flex-row items-center gap-5 md:gap-6">
                <img id="headerLogo" src="image/logo.png" alt="MashaAllah Logo"
                    class="w-20 h-20 md:w-24 md:h-24 rounded-2xl shadow-xl border-3 border-white/40 object-cover hover:scale-105 transition-transform duration-300"
                    onerror="this.src='https://placehold.co/100x100?text=M'">
                <div class="text-center md:text-left">
                    <h1 id="headerShopName"
                        class="text-3xl md:text-4xl lg:text-5xl font-extrabold text-white tracking-tight drop-shadow-lg">
                        MashaAllah</h1>
                    <p id="headerShopTagline" class="text-orange-100 text-base md:text-lg mt-2 font-medium">Shop with
                        Trust, Guaranteed Satisfaction ✨</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content Card -->
    <div class="max-w-5xl mx-auto px-6 -mt-10 pb-16">
        <div
            class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-orange-100 transform transition-all duration-300 hover:shadow-3xl">
            <!-- Decorative top bar -->
            <div class="h-2 gradient-bg"></div>

            <div class="p-8 md:p-10">
                <!-- Dynamic Page Title -->
                <div class="mb-2">
                    <span id="pageTitleDisplay"
                        class="text-xs font-semibold text-orange-500 uppercase tracking-wider">Information</span>
                </div>

                <!-- Content Area -->
                <div id="dynamicContent" class="min-h-[400px]">
                    <!-- JS will populate -->
                </div>

                <!-- Back Button with Icon - FIXED span with proper ID -->
                <div class="mt-10 pt-6 border-t border-gray-100 flex flex-wrap justify-between items-center gap-4">
                    <a href="index.html"
                        class="inline-flex items-center gap-2 px-5 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl transition-all duration-200 font-medium hover:shadow-md">
                        <i class="fas fa-arrow-left text-sm"></i>
                        Back to Shop
                    </a>
                    <div class="flex items-center gap-3 text-sm text-gray-400">
                        <i class="fab fa-instagram hover:text-orange-500 cursor-pointer transition"></i>
                        <i class="fab fa-twitter hover:text-orange-500 cursor-pointer transition"></i>
                        <i class="fab fa-facebook hover:text-orange-500 cursor-pointer transition"></i>
                        <span class="mx-1">|</span>
                        <i class="far fa-heart text-orange-400"></i>
                        <!-- CORRECTED SPAN with unique ID to be populated dynamically -->
                        <span id="footerShopNameSpan" class="text-gray-500">MashaAllah</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer Note with animated decoration -->
        <div class="text-center mt-8">
            <div
                class="inline-flex items-center gap-3 text-gray-400 text-sm bg-white/50 backdrop-blur-sm px-5 py-2 rounded-full shadow-sm">
                <i class="fas fa-shield-alt text-orange-400"></i>
                <span>Secure & Trusted</span>
                <i class="fas fa-circle text-orange-300 text-xs"></i>
                <i class="fas fa-truck-fast text-orange-400"></i>
                <span>Fast Delivery Worldwide</span>
                <i class="fas fa-circle text-orange-300 text-xs"></i>
                <i class="fas fa-headset text-orange-400"></i>
                <span>24/7 Support</span>
            </div>
        </div>
    </div>

</body>

</html>
