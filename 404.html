<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <title id="metaTitle">Page Not Found | Loading...</title>

    <!-- SEO Meta -->
    <meta name="description" id="metaDescription" content="">
    <meta name="keywords" id="metaKeywords" content="">
    <meta name="author" id="metaAuthor" content="">

    <link rel="shortcut icon" id="metaFavicon" href="image/logo.png" type="image/x-icon">

    <!-- Open Graph -->
    <meta property="og:title" id="ogTitle" content="">
    <meta property="og:description" id="ogDescription" content="">
    <meta property="og:image" id="ogImage" content="">
    <meta property="og:type" content="website">

    <!-- Recommended extra SEO -->
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0B1F3A">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(102, 126, 234, 0.95) 0%, rgba(118, 75, 162, 0.95) 100%),
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.02) 0px, rgba(255, 255, 255, 0.02) 2px, transparent 2px, transparent 8px);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            backdrop-filter: blur(0px);
        }

        .error-container {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(0px);
            border-radius: 48px;
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
            overflow: hidden;
            text-align: center;
            animation: fadeInUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .error-container:hover {
            transform: translateY(-4px);
            box-shadow: 0 40px 70px -20px rgba(0, 0, 0, 0.5);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .error-content {
            padding: 56px 40px;
        }

        /* professional logo wrapper */
        .logo-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
        }

        #brandLogo {
            max-height: 64px;
            width: auto;
            object-fit: contain;
            transition: transform 0.25s ease;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.05));
        }

        #brandLogo:hover {
            transform: scale(1.02);
        }

        .error-icon {
            font-size: 110px;
            line-height: 1;
            margin-bottom: 16px;
            display: inline-block;
            animation: float 4s ease-in-out infinite;
            background: rgba(102, 126, 234, 0.1);
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        .error-code {
            font-size: 130px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 70%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -6px;
            line-height: 1;
            margin-bottom: 16px;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.2);
        }

        h1 {
            font-size: 32px;
            color: #1e293b;
            margin-bottom: 16px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .error-message {
            font-size: 17px;
            color: #475569;
            line-height: 1.5;
            margin-bottom: 36px;
            max-width: 460px;
            margin-left: auto;
            margin-right: auto;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(105deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 32px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.35);
            border: none;
            cursor: pointer;
            letter-spacing: -0.2px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 28px rgba(102, 126, 234, 0.45);
            background: linear-gradient(105deg, #5a6fdd 0%, #6a4190 100%);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #ffffff;
            color: #334155;
            padding: 14px 32px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            border: 1px solid #e2e8f0;
            transition: all 0.25s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }

        .btn-secondary:hover {
            background: #f8fafc;
            transform: translateY(-2px);
            border-color: #cbd5e1;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
        }

        .brand-info {
            margin: 12px 0 16px 0;
            padding: 0 8px;
        }

        .brand-name {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
            letter-spacing: -0.2px;
        }

        .brand-tagline {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 8px;
            font-weight: 450;
        }

        .contact-info {
            padding-top: 28px;
            border-top: 1px solid #eef2f6;
            margin-top: 20px;
            background: #fefefe;
            border-radius: 28px;
        }

        .contact-info p {
            font-size: 14px;
            color: #5b6e8c;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .contact-links {
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
        }

        .contact-links a {
            color: #4f46e5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f1f5f9;
            padding: 6px 16px;
            border-radius: 40px;
        }

        .contact-links a:hover {
            color: #4338ca;
            background: #e6edf5;
            transform: translateY(-1px);
        }

        /* suggested section modern */
        .suggestions-card {
            margin-top: 28px;
            background: #f9fafc;
            border-radius: 28px;
            padding: 20px 20px 16px;
            text-align: left;
            border: 1px solid #eef2f8;
            transition: all 0.2s;
        }

        .suggestions-card p {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 14px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .suggestions-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }

        .suggestions-grid a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 10px 20px;
            border-radius: 48px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .suggestions-grid a:hover {
            background: #667eea10;
            border-color: #cbd5e1;
            color: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.03);
        }

        @media (max-width: 560px) {
            .error-content {
                padding: 36px 24px;
            }

            .error-code {
                font-size: 82px;
                letter-spacing: -3px;
            }

            .error-icon {
                width: 100px;
                height: 100px;
                font-size: 70px;
            }

            h1 {
                font-size: 26px;
            }

            .error-message {
                font-size: 15px;
                margin-bottom: 28px;
            }

            .btn-primary,
            .btn-secondary {
                padding: 12px 22px;
                font-size: 14px;
            }

            .brand-name {
                font-size: 20px;
            }

            .suggestions-grid a {
                padding: 8px 16px;
                font-size: 13px;
            }
        }

        @media (max-width: 420px) {
            .error-content {
                padding: 28px 20px;
            }

            .action-buttons {
                gap: 12px;
            }

            .contact-links {
                gap: 12px;
            }
        }

        /* utility */
        .mt-2 {
            margin-top: 8px;
        }

        .text-sm {
            font-size: 13px;
        }

        .text-gray-400 {
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="error-container">
        <div class="error-content">

            <!-- Logo with professional wrapper -->
            <div class="logo-wrapper">
                <img id="brandLogo" src="image/logo.png" alt="Brand Logo" style="height: 64px; width: auto;">
            </div>

            <div class="error-icon">🔍</div>
            <div class="error-code">404</div>

            <h1 id="errorTitle">Page Not Found</h1>

            <div class="error-message" id="errorMessage">
                Oops! The page you're looking for doesn't exist or has been moved.
            </div>

            <div class="action-buttons">
                <a href="/" class="btn-primary" id="homeLink">
                    🏠 Back to Home
                </a>

                <a href="#" class="btn-secondary" id="contactLink">
                    📞 Contact Support
                </a>
            </div>

            <div class="brand-info">
                <div class="brand-name" id="brandName">Loading...</div>
                <div class="brand-tagline" id="brandTagline">Loading...</div>
            </div>

            <div class="contact-info">
                <p>✨ Need help finding something?</p>
                <div class="contact-links" id="contactLinks">
                    <!-- Dynamic links -->
                </div>
            </div>

            <!-- 🔥 Recommended Section - modern suggestions -->
            <div class="suggestions-card" id="suggestions">
                <!-- Dynamic suggestions will be injected -->
            </div>

        </div>
    </div>

    <script type="module">
        import { shopMeta } from './shopMetaPage.js';

        function update404Meta(shopMeta) {
            const name = shopMeta?.website?.name || "Shop";
            const desc = shopMeta?.website?.description || "";
            const logo = shopMeta?.website?.logo || "image/logo.png";

            const fullDescription = `Page not found. ${desc}`;
            const keywords = "404 page, page not found, online shopping Pakistan, secure checkout, trusted store";

            // Title
            document.getElementById("metaTitle").textContent = `Page Not Found | ${name}`;

            // Meta tags
            document.getElementById("metaDescription")?.setAttribute("content", fullDescription);
            document.getElementById("metaKeywords")?.setAttribute("content", keywords);
            document.getElementById("metaAuthor")?.setAttribute("content", name);

            // Favicon
            document.getElementById("metaFavicon")?.setAttribute("href", logo);

            // Open Graph
            document.getElementById("ogTitle")?.setAttribute("content", `Page Not Found | ${name}`);
            document.getElementById("ogDescription")?.setAttribute("content", fullDescription);
            document.getElementById("ogImage")?.setAttribute("content", logo);
        }

        function render404Page(shopMeta) {
            const name = shopMeta?.website?.name || "Elite Store";
            const logo = shopMeta?.website?.logo || "image/logo.png";
            const tagline = shopMeta?.website?.tagline || shopMeta?.website?.description || "Your trusted shopping destination";

            // update brand assets
            const logoImg = document.getElementById("brandLogo");
            if (logoImg) logoImg.src = logo;
            document.getElementById("brandName").textContent = name;
            document.getElementById("brandTagline").textContent = tagline;

            // Optional text remains clear
            document.getElementById("errorTitle").textContent = "Page Not Found";
            document.getElementById("errorMessage").textContent = "Oops! The page you're looking for doesn't exist or may have been moved.";

            // Contact links (social, phone, email) — professional
            const social = shopMeta?.contact?.social || {};
            const phone = shopMeta?.contact?.phone || "";
            const email = shopMeta?.contact?.email || "";
            const contactLinksContainer = document.getElementById("contactLinks");

            let contactHtml = "";
            if (phone) contactHtml += `<a href="tel:${phone}">📞 Call Support</a>`;
            if (email) contactHtml += `<a href="mailto:${email}">📧 Email Us</a>`;
            if (social.whatsapp) contactHtml += `<a href="${social.whatsapp}" target="_blank" rel="noopener noreferrer">💬 WhatsApp</a>`;
            if (social.instagram) contactHtml += `<a href="${social.instagram}" target="_blank" rel="noopener noreferrer">📸 Instagram</a>`;
            if (social.facebook) contactHtml += `<a href="${social.facebook}" target="_blank" rel="noopener noreferrer">📘 Facebook</a>`;

            // fallback: if none exist, show a friendly generic contact
            if (!contactHtml) {
                contactHtml = `<a href="/contact">📬 Contact Page</a>`;
            }
            contactLinksContainer.innerHTML = contactHtml;

            // Contact button link: priority whatsapp or email or home
            let contactBtnUrl = "/contact";
            if (social.whatsapp) contactBtnUrl = social.whatsapp;
            else if (email) contactBtnUrl = `mailto:${email}`;
            else if (phone) contactBtnUrl = `tel:${phone}`;
            document.getElementById("contactLink").href = contactBtnUrl;

            // 🔥 Professional suggestions section with clean layout and richer options
            const suggestionsDiv = document.getElementById("suggestions");
            suggestionsDiv.innerHTML = `
                    <p>💡 <span>You might find these helpful:</span></p>
                    <div class="suggestions-grid">
                        <a href="/">🏠 Homepage</a>
                        <a href="/shop">🛍️ Browse All Products</a>
                        <a href="/collections">📦 Collections</a>
                        <a href="/contact">📬 Support Center</a>
                        <a href="/search">🔎 Search Store</a>
                    </div>
                    <div class="mt-2 text-sm text-gray-400" style="margin-top: 16px; text-align: center; font-size: 12px; color: #8ba0bc;">
                        ⚡ If you think something is broken, let us know.
                    </div>
                `;
        }

        const safeMeta = shopMeta && typeof shopMeta === 'object'
                ? shopMeta
                : {
                    website: {
                        name: "MashaAllah",
                        description: "MashaAllah is your trusted online shopping destination in Pakistan. 7-day return guarantee and fast delivery.",
                        logo: "image/logo.png",
                        tagline: "Shop with Trust, Guaranteed Satisfaction"
                    },
                    contact: {
                        phone: "+92 341-3775-100",
                        email: "sayeshamall@gmail.com",
                        address: "Pakistan",
                        social: {
                            facebook: "https://web.facebook.com/profile.php?id=61578279846188",
                            instagram: "https://www.instagram.com/ayeshamall2/",
                            tiktok: "https://www.tiktok.com/@ayeshamall0"
                        }
                    }
                };

        render404Page(safeMeta);
        update404Meta(safeMeta);

        // Additional polish: handle any missing dynamic logo gracefully
        const logoCheck = document.getElementById("brandLogo");
        if (logoCheck && (!logoCheck.src || logoCheck.src.includes("undefined") || logoCheck.src === window.location.href + "image/logo.png")) {
            // fallback: try inline base64 minimal placeholder if needed, but just keep original path.
            logoCheck.onerror = function () {
                this.style.display = "none";
                const placeholderSpan = document.createElement("div");
                placeholderSpan.style.fontSize = "28px";
                placeholderSpan.style.fontWeight = "bold";
                placeholderSpan.style.background = "#eef2ff";
                placeholderSpan.style.padding = "8px 20px";
                placeholderSpan.style.borderRadius = "48px";
                placeholderSpan.style.color = "#4f46e5";
                placeholderSpan.innerText = safeMeta?.website?.name?.charAt(0) || "S";
                this.parentNode?.appendChild(placeholderSpan);
                this.style.display = "none";
            };
        }
    </script>
</body>

</html>
